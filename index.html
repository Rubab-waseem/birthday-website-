<!DOCTYPE html>
<html>

<head>
    <title>Birthday Pin</title>
</head>

<body>
    <center>

        <h1>🎁 Secret Birthday Gift 🎁</h1>

        <p>Enter Your Birthday (DDMM)</p>

        <input type="password" id="pin" placeholder="Example: 1705">

        <br><br>

        <button onclick="checkPin()">Open Gift</button>

        <p id="message"></p>

    </center>

    <script>

        function checkPin() {

            let pin =
    document.getElementById("pin").value;

            if (pin == "1705") {

                window.location.href =
    "gift.html";
            } else {

    document.getElementById("message").innerHTML ="✖ Wrong Birthday";

            }
            
        }
    </script>

</body>

</html>
